<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0a0a0a" />
<title>Nuclear Stories — Studio</title>
<link rel="manifest" href="manifest.webmanifest" />
<link rel="apple-touch-icon" href="icons/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<style>
:root{--green:#2db086;--green-glow:rgba(45,176,134,.55);--black:#070707;--panel:#111;
  --line:#242424;--light:#f2f2f2;--muted:#8a8f8c}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--black);
  color:var(--light);-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
a{color:var(--green)}
.wrap{max-width:760px;margin:0 auto;padding:18px}
header{display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--line);position:sticky;top:0;
  background:rgba(7,7,7,.9);backdrop-filter:blur(8px);z-index:10}
header h1{font-size:16px;letter-spacing:.14em;text-transform:uppercase}
header h1 b{color:var(--green)}
.btn{border:1px solid var(--line);background:transparent;color:var(--light);
  border-radius:8px;padding:11px 16px;font-size:14px;cursor:pointer;
  transition:border-color .2s,color .2s}
.btn:hover{border-color:var(--green);color:var(--green)}
.btn.green{background:var(--green);border-color:var(--green);color:#05130e;font-weight:700}
.btn.sm{padding:7px 11px;font-size:12.5px;border-radius:7px}
.btn.danger:hover{border-color:#e0554e;color:#e0554e}
.hidden{display:none!important}
/* login */
.login{max-width:380px;margin:12vh auto;padding:28px;border:1px solid var(--line);
  border-radius:14px;background:var(--panel)}
.login h2{font-size:18px;margin-bottom:6px}
.login p{color:var(--muted);font-size:14px;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);text-transform:uppercase;
  letter-spacing:.1em;margin-bottom:6px}
input,select,textarea{width:100%;background:#0c0c0c;border:1px solid var(--line);
  color:var(--light);border-radius:8px;padding:12px;font-size:15px;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--green)}
.msg{font-size:13px;margin-top:12px;min-height:16px}
.msg.err{color:#e0554e}.msg.ok{color:var(--green)}
/* toolbar */
.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin:18px 0}
.toolbar select{width:auto;min-width:180px}
.seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.seg button{background:transparent;border:0;color:var(--muted);padding:9px 14px;cursor:pointer;font-size:13px}
.seg button.on{background:var(--green);color:#05130e;font-weight:700}
/* dropzone */
.drop{border:1.5px dashed var(--line);border-radius:14px;padding:30px;text-align:center;
  color:var(--muted);cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:6px}
.drop.hot{border-color:var(--green);background:rgba(45,176,134,.06);color:var(--light)}
.drop b{color:var(--green)}
/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:18px}
.card{border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--panel);
  display:flex;flex-direction:column}
.card .thumb{position:relative;aspect-ratio:4/5;background:#0c0c0c;overflow:hidden}
.card .thumb img{width:100%;height:100%;object-fit:cover;display:block}
.card.newflag .thumb::after{content:"NEW";position:absolute;top:8px;left:8px;
  background:var(--green);color:#05130e;font-size:10px;font-weight:800;letter-spacing:.1em;
  padding:3px 7px;border-radius:5px;box-shadow:0 0 0 0 var(--green-glow);
  animation:glow 1.8s ease-in-out infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 var(--green-glow)}50%{box-shadow:0 0 0 7px rgba(45,176,134,0)}}
.card.archived{opacity:.5}
.card .body{padding:10px 11px;display:flex;flex-direction:column;gap:7px}
.card .cat{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--green)}
.card .glowstate{font-size:10.5px;color:var(--muted)}
.card .glowstate.on{color:var(--green)}
.card textarea{font-size:13px;min-height:44px;resize:vertical;padding:8px}
.card .row{display:flex;gap:6px;flex-wrap:wrap}
.card .row .btn{flex:1}
.empty{color:var(--muted);text-align:center;padding:40px 0;font-size:14px}
.bar{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--panel);
  border:1px solid var(--green);border-radius:12px;padding:12px 18px;font-size:14px;
  box-shadow:0 20px 60px rgba(0,0,0,.6);z-index:30;max-width:90vw}
/* ---------- photo editor (Phase 2) ---------- */
body.noscroll{overflow:hidden}
.ed{position:fixed;inset:0;z-index:40;background:var(--black);display:flex;flex-direction:column;
  padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}
.ed-top{display:flex;align-items:center;justify-content:space-between;gap:10px;
  padding:12px 14px;border-bottom:1px solid var(--line);flex:0 0 auto}
.ed-count{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
.ed-stage{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;
  padding:14px;overflow:hidden}
.ed-stage canvas{border-radius:10px;touch-action:none;cursor:grab;background:#0c0c0c;
  box-shadow:0 0 0 1px var(--line),0 24px 60px rgba(0,0,0,.6)}
.ed-stage canvas:active{cursor:grabbing}
.ed-controls{flex:0 0 auto;border-top:1px solid var(--line);padding:12px 14px 16px;
  max-height:44vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.ed-row{display:flex;gap:7px;overflow-x:auto;padding-bottom:9px;scrollbar-width:none}
.ed-row::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;background:transparent;border:1px solid var(--line);color:var(--muted);
  border-radius:999px;padding:7px 14px;font-size:12.5px;cursor:pointer;font-family:inherit;
  transition:border-color .15s,color .15s}
.chip:hover{border-color:var(--green);color:var(--light)}
.chip.on{background:var(--green);border-color:var(--green);color:#05130e;font-weight:700}
.ed-sliders{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:9px 18px;margin:10px 0 12px}
.ed-sliders label{display:flex;align-items:center;gap:10px;font-size:11px;color:var(--muted);
  text-transform:uppercase;letter-spacing:.09em}
.ed-sliders label span{flex:0 0 74px}
.ed-sliders input[type=range]{flex:1;width:auto;padding:0;background:transparent;border:0;
  accent-color:var(--green);height:22px}
.ed-actions{display:flex;gap:8px}
.ed-actions .btn{flex:1}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <h2>Nuclear Stories</h2>
  <p>Studio access — sign in to manage the website stories.</p>
  <div class="field"><label>Email</label><input id="email" type="email" autocomplete="username" /></div>
  <div class="field"><label>Password</label><input id="password" type="password" autocomplete="current-password" /></div>
  <button class="btn green" id="loginBtn" style="width:100%">Sign In</button>
  <div class="msg" id="loginMsg"></div>
</div>

<!-- APP -->
<div id="app" class="hidden">
  <header>
    <h1><b>Nuclear</b> Stories</h1>
    <button class="btn sm" id="logoutBtn">Sign out</button>
  </header>
  <div class="wrap">
    <div class="toolbar">
      <select id="catSelect" aria-label="Category"></select>
      <div class="seg" role="tablist">
        <button id="tabActive" class="on">Active</button>
        <button id="tabArchived">Archived</button>
      </div>
      <button class="btn sm" id="addCatBtn">+ Category</button>
    </div>

    <div class="drop" id="drop">
      <input id="file" type="file" accept="image/*" multiple hidden />
      Drop photos here or <b>tap to upload</b> — they post to the selected category, newest first, with the glow.
    </div>

    <div class="grid" id="grid"></div>
    <div class="empty hidden" id="empty">No stories here yet.</div>
  </div>
</div>

<!-- PHOTO EDITOR (Phase 2) -->
<div id="editor" class="ed hidden">
  <div class="ed-top">
    <button class="btn sm danger" id="edDiscard">Discard</button>
    <div class="ed-count" id="edCount">Edit photo</div>
    <button class="btn sm green" id="edDone">Use Photo</button>
  </div>

  <div class="ed-stage" id="edStage">
    <canvas id="edCanvas"></canvas>
  </div>

  <div class="ed-controls">
    <div class="ed-row" id="edAspects"></div>
    <div class="ed-row" id="edPresets"></div>

    <div class="ed-sliders">
      <label><span>Zoom</span><input type="range" id="edZoom" min="1" max="4" step="0.01" value="1" /></label>
      <label><span>Straighten</span><input type="range" id="edRot" min="-15" max="15" step="0.5" value="0" /></label>
      <label><span>Brightness</span><input type="range" id="edBrightness" min="50" max="150" step="1" value="100" /></label>
      <label><span>Contrast</span><input type="range" id="edContrast" min="50" max="150" step="1" value="100" /></label>
      <label><span>Saturation</span><input type="range" id="edSaturate" min="0" max="200" step="1" value="100" /></label>
      <label><span>Warmth</span><input type="range" id="edWarmth" min="-100" max="100" step="1" value="0" /></label>
    </div>

    <div class="ed-actions">
      <button class="btn sm" id="edReset">Reset</button>
      <button class="btn sm" id="edSkip">Skip edit — post as-is</button>
    </div>
  </div>
</div>

<div id="toast" class="bar hidden"></div>

<script src="config.js"></script>
<script type="module" src="app.js"></script>
</body>
</html>
